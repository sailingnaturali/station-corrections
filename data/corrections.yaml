# These six arrive with their own qualifier already in the raw name (e.g.
# "Blaine, Semiahmoo Bay"), so the derived-context fallback finds a gazetteer
# place whose name is a substring of the raw name and suppresses itself via
# namesOverlap - correctly avoiding a tautology like "Blaine near Blaine, WA",
# but leaving these six with no context at all. Curated the same as every
# other entry above rather than loosening namesOverlap, which is doing its
# job for the 18 stations it was written for.

