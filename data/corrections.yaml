# Corrections to published station data. One record per station, keyed by
# provider ID. Every field is optional except `reason`, which is required
# whenever `position` is set.
#
# `context` is whatever most usefully distinguishes this place — a water body,
# an island group, a region, a county, or a characteristic. It must never
# restate the name.
#
# `formerSlugs` records a slug this station used to resolve to, so a consumer
# can redirect an old shared link instead of 404ing it. Set it in the same
# change that moves `slug` - `station-corrections check-slugs` (data/slugs.lock.json)
# fails a slug change that does not record the old value here.

noaa/9447659:
  name: Everett
  context: Port Gardner
  slug: everett
  cities: [Everett, Marysville]
  aliases: [port gardner, everett marina]

noaa/9442396:
  name: La Push
  context: Quillayute River
  slug: la-push
  cities: [Forks]
  positionVerified: >-
    Sited up the Quillayute River. OSM land-polygons maps the ocean coastline
    only, so a riverine gauge reads inland by construction - the published
    position is correct.

