# Stations whose identity this package owns, rather than corrects.
#
# Unlike corrections.yaml, these records have no upstream to differ from: the
# name is not a provider's name and the position is not a correction of a
# published one. CHS tidal-current gates are the first data like this - the
# fitting pipeline emits a hand-written label and no position at all.
#
# Two bounded, hand-curated classes, told apart by `kind`:
#   - current gates (`kind: current`, or omitted - the registry was gates-only
#     first). A current station joins when safe transit requires timing slack:
#     the gates on the Inside Passage route, not every interesting current.
#   - tide reference ports (`kind: tide`). A tide station joins when CHS itself
#     designates it a reference port - an external rule we did not invent.
# Both rules are expansion-friendly and rule-governed; neither is a cap. A
# consumer picks the right CHS series (currents vs tides) by a station's kind.
#
# A current gate may additionally carry a `derived` block when CHS publishes no
# current station for it and slack is derived from a reference tide port's
# high/low water (see the "Derived gates" section below). It stays kind:current
# - it is still a gate - but a consumer reads its slack from the reference, not
# from a fitted current series.
#
# Keys match what chs-constituents emits ("chs-" + slug of the label), so a
# consumer can resolve straight from the id in its own output.
#
# These are our own facts, not a copy of a provider's station file. Names and
# contexts are hand-written here; positions are independently derived from the
# chs-constituents fitting pipeline and currents-vault pass frontmatter, and
# agree with chs-constituents/stations/salish-sea.json. The registry ships no
# provider-minted identifiers - that id lives only in each operator's local,
# licence-covered pipeline (see PROVENANCE.md). Every station is
# human-reviewed before it lands. That default provenance is documented once
# in PROVENANCE.md; set a station's `source` field only when its facts came
# from somewhere else (see noaa-boundary-pass).
#
# `formerSlugs` records a slug this station used to resolve to, so a consumer
# can redirect an old shared link instead of 404ing it. Set it in the same
# change that moves `slug` - `station-corrections check-slugs` (data/slugs.lock.json)
# fails a slug change that does not record the old value here.
#
# Only record a former slug when the new slug points at the *same place*: a
# rename qualifies, a mislabel does not - redirecting a mislabel preserves a
# wrong link, where a 404 is more honest (issue #6, the retired `anacortes`).
# No validator can make that call. Slug changes are rare; downstream consumers
# own the redirect consequences either way.
#
# One entry is not CHS: noaa-boundary-pass is a NOAA current station, carried
# here because currents-vault (which curates the same 20 gates) is dropping
# station identity in favour of this registry.

