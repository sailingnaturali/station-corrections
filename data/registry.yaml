# --- Derived gates (kind: current + a `derived` block) ---
# A current gate CHS publishes no current station for: slack does not come from
# a fitted current series but is *derived* from a reference tide port's high and
# low water, plus a fixed per-gate lag. `derived.reference` is the registry key
# of that tide port; `hwLagMinutes`/`lwLagMinutes` are minutes after its HW/LW
# that slack occurs. The pass floods on the rising tide and ebbs on the falling
# one, so a consumer states slack times and a flood/ebb phase, but never a
# speed - CHS predicts none. Distinct from a fitted gate, which carries its own
# constituents; a derived gate carries only the reference and the two lags.

chs-malibu-rapids:
  name: Malibu Rapids
  context: Princess Louisa Inlet
  position: [50.1626, -123.8515]
  provider: chs
  kind: current
  aliases: [princess louisa, malibu islet]
  source: >-
    No CHS current station; slack is derived from Point Atkinson high/low water
    (HW+25 / LW+35 min, cruising-community consensus - Points North seminar,
    Waggoner). Position is in the Malibu Rapids channel on the Jervis Inlet
    approach, nudged ~110 m off the CHS Malibu Islet station (50.163, -123.85),
    which sits sub-resolution on the bundled coastline. See PROVENANCE.md.
  derived:
    reference: chs-point-atkinson
    hwLagMinutes: 25
    lwLagMinutes: 35

# --- Tide reference ports (kind: tide) ---
# CHS designates these reference ports itself; probing the 47-51.5N / 126.5-122W
# box found exactly these 10 (chs-online design spec §6b). Positions are from
# CHS's public prediction-station list, matched by position and confirmed in
# water by the coastline audit (all 10 land "clear") - not the fitting pipeline
# that supplies the current gates. See PROVENANCE.md. The pass is naming-led:
# display names are shortened where safe (the resolver keys on position, not
# name), contexts never restate the name, aliases are what a local would type.

