# Stations whose identity this package owns, rather than corrects.
#
# Unlike corrections.yaml, these records have no upstream to differ from: the
# name is not a provider's name and the position is not a correction of a
# published one. CHS tidal-current gates are the first data like this - the
# fitting pipeline emits a hand-written label and no position at all.
#
# Keys match what chs-constituents emits ("chs-" + slug of the label), so a
# consumer can resolve straight from the id in its own output.
#
# These are our own facts, not a copy of a provider's station file. Names and
# contexts are hand-written here; positions are independently derived from the
# chs-constituents fitting pipeline and currents-vault pass frontmatter, and
# agree with chs-constituents/stations/salish-sea.json. Only `providerId` (and
# NOAA's `providerBin`) is the provider's own handle, carried because it keys
# the provider's API. Every station is human-reviewed before it lands. That
# default provenance is documented once in PROVENANCE.md; set a station's
# `source` field only when its facts came from somewhere else (see
# noaa-boundary-pass).
#
# `formerSlugs` records a slug this station used to resolve to, so a consumer
# can redirect an old shared link instead of 404ing it. Set it in the same
# change that moves `slug` - `station-corrections check-slugs` (data/slugs.lock.json)
# fails a slug change that does not record the old value here.
#
# One entry is not CHS: noaa-boundary-pass is a NOAA current station, carried
# here because currents-vault (which curates the same 20 gates) is dropping
# station identity in favour of this registry. Its providerId is a NOAA
# station id rather than a CHS constituent id, and it sets providerBin - the
# depth cell a NOAA current reading must be requested at - which the CHS
# entries have no use for.

