name: publish
on:
  release:
    types: [published]
permissions:
  contents: read
  id-token: write # npm trusted publishing (OIDC)
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm test
      - run: node bin/station-corrections.mjs validate
      - run: node bin/station-corrections.mjs check-slugs
      - run: npm run check:data
      - run: npm publish
