name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Runs the JS tests and type-checks the shipped declarations against
      # consumer-shaped usage, so index.d.ts cannot drift from the runtime.
      - run: npm test
      # The corrections file is hand-edited and PR-able, so it is checked on
      # every change: reason required with position, no context that restates
      # the name, no duplicate slugs.
      #
      # No stations file to pass here, so the distance-from-published check
      # sits out - it needs the provider's own list, which this repo does not
      # ship. Consumers that have one get it via `validate <stations.json>`.
      - run: node bin/station-corrections.mjs validate
      # data/corrections.json is compiled from the YAML and committed, because
      # browsers cannot read the YAML off disk. A PR that edits the YAML and
      # not the artifact would ship them out of step - this catches that.
      - run: npm run check:data
